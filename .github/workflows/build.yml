name: Github Actions
on: [push, pull_request]
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: treeform/setup-nim-action@v2
    - run: nimble test -y

  integration-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: treeform/setup-nim-action@v2
    - run: make integration-test
